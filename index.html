<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Clock</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <main class="app-shell">
    <section class="card">
      <header class="app-header">
        <div>
          <h1>Job Clock</h1>
          <p>Select your name and clock in/out.</p>
        </div>
      </header>

      <div id="loadingBox" class="loading">Loading job...</div>

      <div id="errorBox" class="alert error hidden"></div>

      <section id="loginBox" class="hidden">
        <label for="workerSelect">Select Worker</label>
        <select id="workerSelect"></select>

        <label for="pinInput">PIN</label>
        <input id="pinInput" type="password" placeholder="Enter PIN" />

        <button class="btn primary" onclick="continueToJob()">Continue</button>
      </section>

      <section id="jobBox" class="hidden">
        <div class="job-summary">
          <h2 id="clientName"></h2>
          <p id="jobDate"></p>
          <p id="jobAddress"></p>
        </div>

        <div class="info-list">
          <div>
            <span>Worker</span>
            <p id="selectedWorkerInfo"></p>
          </div>

          <div>
            <span>Assigned Time</span>
            <p id="assignedTime"></p>
          </div>

          <div>
            <span>Service Type</span>
            <p id="serviceType"></p>
          </div>

          <div>
            <span>Entry Info</span>
            <p id="entrance"></p>
          </div>

          <div>
            <span>Material Info</span>
            <p id="materialInfo"></p>
          </div>

          <div>
            <span>Instructions</span>
            <p id="instructions"></p>
          </div>

          <div>
            <span>Other Info</span>
            <p id="otherInfo"></p>
          </div>
        </div>

        <div id="timerBox" class="timer-box hidden">
          <span>Clocked In</span>
          <strong id="timer">00:00:00</strong>
        </div>

        <button id="clockInBtn" class="btn clock-in" onclick="clockIn()">Clock In</button>
        <button id="clockOutBtn" class="btn clock-out hidden" onclick="clockOut()">Clock Out</button>

        <div id="messageBox" class="alert hidden"></div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
